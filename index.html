<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distribución CEDIS</title>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#0F6E56;--green-l:#E1F5EE;--green-m:#1D9E75;
  --blue:#378ADD;--blue-l:#E6F1FB;
  --amber:#EF9F27;--amber-l:#FAEEDA;--amber-d:#854F0B;
  --red:#E24B4A;--red-l:#FCEBEB;--red-d:#A32D2D;
  --border:#e2e2de;--bg:#f0f0ec;--surface:#fff;
  --text:#1a1a18;--muted:#666;--hint:#aaa;
  --r:8px;--rl:12px;
  font-family:-apple-system,'Segoe UI',system-ui,sans-serif;
}

/* ── Print ── */
@media print {
  body { background: white; padding: 0; }
  .no-print { display: none !important; }
  .card-grid { grid-template-columns: 1fr 1fr !important; gap: 12px !important; }
  .suc-card { break-inside: avoid; box-shadow: none !important; border: 1px solid #ccc !important; }
  .card-body { max-height: none !important; overflow: visible !important; }
  .top-bar, #step-upload, #step-loading { display: none !important; }
}

body{background:var(--bg);color:var(--text);min-height:100vh;padding:1.25rem}

/* ── Top bar ── */
.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;flex-wrap:wrap}
.logo{width:34px;height:34px;background:var(--green-l);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.title{font-size:15px;font-weight:600;color:var(--text)}
.subtitle{font-size:11px;color:var(--muted)}
.spacer{flex:1}
.top-actions{display:flex;gap:8px;align-items:center}

/* ── Upload card ── */
.upload-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.5rem;max-width:680px;margin:0 auto}

/* ── Drop zones ── */
.dz-wrap{margin-bottom:8px}
.dropzone{border:1.5px dashed var(--border);border-radius:var(--r);padding:13px 15px;cursor:pointer;background:var(--bg);display:flex;align-items:center;gap:12px;transition:border-color .15s,background .15s}
.dropzone:hover{border-color:#999}
.dropzone.drag-over{border-color:var(--green-m);background:var(--green-l)}
.dz-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dz-label{font-size:13px;font-weight:500}.dz-sub{font-size:11px;color:var(--muted);margin-top:2px}
.dz-badge{display:none;margin-left:auto;font-size:11px;font-weight:500;border-radius:6px;padding:3px 9px;flex-shrink:0}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.chip{display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px}
.chip-name{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.chip-rm{background:none;border:none;cursor:pointer;padding:0;color:var(--muted);font-size:15px;line-height:1}

/* ── Buttons ── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 16px;font-size:13px;font-weight:500;border-radius:var(--r);border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--green);color:#fff;width:100%;margin-top:10px}
.btn-primary:not(:disabled):hover{background:#0a5c47}
.btn-sm{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.btn-sm:hover{background:var(--bg)}
.btn-icon{width:32px;height:32px;padding:0;border-radius:6px;background:rgba(255,255,255,0.2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:inherit;transition:background .15s}
.btn-icon:hover{background:rgba(255,255,255,0.35)}

/* ── Summary row ── */
.summary-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.sum-pill{font-size:12px;font-weight:500;border-radius:20px;padding:5px 12px;border:1px solid transparent}
.sum-rep{background:var(--green-l);color:var(--green);border-color:#9FE1CB}
.sum-neg{background:var(--amber-l);color:var(--amber-d);border-color:var(--amber)}
.sum-sin{background:var(--red-l);color:var(--red-d);border-color:#F09595}

/* ── Card grid ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}

/* ── Sucursal card ── */
.suc-card{background:var(--surface);border-radius:var(--rl);overflow:hidden;border:1px solid var(--border)}
.card-header{padding:12px 14px;display:flex;align-items:center;gap:10px;background:var(--green);color:#fff}
.card-header.is-sin{background:#c0392b}
.card-header.is-neg{background:var(--amber-d)}
.card-title{font-size:14px;font-weight:600;flex:1;letter-spacing:0.01em}
.card-count{font-size:11px;opacity:0.85;background:rgba(255,255,255,0.2);border-radius:20px;padding:2px 9px;white-space:nowrap}
.card-body{padding:0;max-height:380px;overflow-y:auto}

/* ── Product rows ── */
.prod-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:0.5px solid var(--border);transition:background .1s}
.prod-row:last-child{border-bottom:none}
.prod-row:hover{background:#fafaf8}
.qty-badge{min-width:28px;height:28px;border-radius:6px;background:var(--green-l);color:var(--green);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qty-badge.is-partial{background:#FAEEDA;color:var(--amber-d)}
.prod-info{flex:1;min-width:0}
.prod-name{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-code{font-size:10px;color:var(--hint);font-family:'Courier New',monospace;margin-top:1px}
.prod-note{font-size:10px;color:var(--amber-d);margin-top:1px}

/* ── Card footer ── */
.card-footer{padding:8px 14px;background:#fafaf8;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-total{font-size:11px;color:var(--muted)}
.card-total strong{color:var(--text)}

/* ── Misc ── */
.loading{padding:3rem 0;text-align:center;background:var(--surface);border-radius:var(--rl)}
.spin{font-size:28px;display:inline-block;animation:spin 1s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.alert{padding:10px 14px;border-radius:var(--r);font-size:12px;display:flex;gap:8px;align-items:flex-start;margin-top:10px}
.alert-r{background:var(--red-l);border:1px solid #F09595;color:var(--red-d)}
.helper{font-size:12px;color:var(--hint);text-align:center;margin-top:8px}
.debug{background:#f0f0ec;border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;font-size:11px;color:var(--muted);margin-top:10px;font-family:'Courier New',monospace;line-height:1.6}
.empty-card{padding:2rem;text-align:center;color:var(--hint);font-size:13px}
</style>
</head>
<body>

<!-- Top bar -->
<div class="top-bar no-print">
  <div class="logo">
    <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="#0F6E56" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 21V7l9-4 9 4v14M9 21V9h6v12"/>
    </svg>
  </div>
  <div><div class="title">Distribución CEDIS</div><div class="subtitle">Traspasos para almacén</div></div>
  <div class="spacer"></div>
  <div class="top-actions" id="result-actions" style="display:none">
    <button class="btn btn-sm" onclick="window.print()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
      Imprimir
    </button>
    <button class="btn btn-sm" onclick="exportar()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
      Excel
    </button>
    <button class="btn btn-sm" onclick="reiniciar()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      Nuevo
    </button>
  </div>
</div>

<!-- Upload -->
<div id="step-upload" class="upload-card">
  <div class="dz-wrap">
    <div class="dropzone" id="dz-v" onclick="pick('iv')">
      <div class="dz-icon" style="background:#E1F5EE">
        <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="#1D9E75" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
      </div>
      <div><div class="dz-label">Ventas por sucursal</div><div class="dz-sub">Un Excel por sucursal</div></div>
      <div class="dz-badge" id="bv" style="background:#E1F5EE;color:#0F6E56"></div>
    </div>
    <div class="chips" id="cv"></div>
  </div>
  <div class="dz-wrap">
    <div class="dropzone" id="dz-e" onclick="pick('ie')">
      <div class="dz-icon" style="background:#E6F1FB">
        <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="#378ADD" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
      </div>
      <div><div class="dz-label">Entradas por proveedor</div><div class="dz-sub">Un Excel por proveedor</div></div>
      <div class="dz-badge" id="be" style="background:#E6F1FB;color:#185FA5"></div>
    </div>
    <div class="chips" id="ce"></div>
  </div>
  <div class="dz-wrap">
    <div class="dropzone" id="dz-n" onclick="pick('in')">
      <div class="dz-icon" style="background:#FAEEDA">
        <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="#EF9F27" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h4a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      </div>
      <div><div class="dz-label">Negados <span style="font-weight:400;color:var(--muted)">(opcional)</span></div><div class="dz-sub">Exportar de Drive como .xlsx</div></div>
      <div class="dz-badge" id="bn" style="background:#FAEEDA;color:#854F0B"></div>
    </div>
    <div class="chips" id="cn"></div>
  </div>
  <div id="upload-err" class="alert alert-r" style="display:none"></div>
  <button class="btn btn-primary" id="btn-run" onclick="procesar()" disabled>
    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    Generar distribución
  </button>
  <div class="helper" id="upload-hint">Necesitas al menos un archivo de ventas y uno de entradas</div>
</div>

<!-- Loading -->
<div id="step-loading" style="display:none" class="upload-card">
  <div class="loading">
    <div class="spin">⚙</div>
    <div style="font-size:14px;color:var(--muted)">Calculando distribución...</div>
  </div>
</div>

<!-- Result -->
<div id="step-result" style="display:none">
  <div class="summary-row no-print" id="summary-row"></div>
  <div class="card-grid" id="card-grid"></div>
  <div id="debug-info" class="debug" style="display:none;margin-top:14px"></div>
</div>

<input type="file" id="iv" multiple accept=".xlsx,.xls" style="display:none" onchange="addF('v',this)">
<input type="file" id="ie" multiple accept=".xlsx,.xls" style="display:none" onchange="addF('e',this)">
<input type="file" id="in" multiple accept=".xlsx,.xls" style="display:none" onchange="addF('n',this)">

<script>
const S={v:[],e:[],n:[],res:null};

// ── Files ──────────────────────────────────────────────────────────────────
function pick(id){document.getElementById(id).click()}
function addF(t,inp){S[t]=[...S[t],...Array.from(inp.files)];inp.value='';drawChips(t);upBtn()}
function rmF(t,i){S[t]=S[t].filter((_,j)=>j!==i);drawChips(t);upBtn()}
function drawChips(t){
  const colors={v:'#1D9E75',e:'#378ADD',n:'#EF9F27'};
  document.getElementById('c'+t).innerHTML=S[t].map((f,i)=>`
    <div class="chip">
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="${colors[t]}" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      <span class="chip-name" title="${f.name}">${f.name}</span>
      <button class="chip-rm" onclick="rmF('${t}',${i})">×</button>
    </div>`).join('');
  const b=document.getElementById('b'+t);
  if(S[t].length){b.textContent=S[t].length+' archivo(s)';b.style.display='block';}
  else b.style.display='none';
}
function upBtn(){
  const ok=S.v.length>0&&S.e.length>0;
  document.getElementById('btn-run').disabled=!ok;
  document.getElementById('upload-hint').style.display=ok?'none':'block';
}
['v','e','n'].forEach(t=>{
  const dz=document.getElementById('dz-'+t);
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
  dz.addEventListener('drop',e=>{
    e.preventDefault();dz.classList.remove('drag-over');
    const fs=Array.from(e.dataTransfer.files).filter(f=>/\.xlsx?$/i.test(f.name));
    if(fs.length){S[t]=[...S[t],...fs];drawChips(t);upBtn();}
  });
});

const readBuf=f=>new Promise((ok,fail)=>{
  const r=new FileReader();r.onload=e=>ok(new Uint8Array(e.target.result));r.onerror=fail;r.readAsArrayBuffer(f);
});

// ── Parsers ────────────────────────────────────────────────────────────────
const BC=/^\d{6,14}$/;
function isBC(v){return v!=null&&BC.test(String(v).trim().split('.')[0])}
function toN(v){if(!v&&v!==0)return 0;try{return parseFloat(String(v).replace(/[$,\s]/g,''))||0}catch{return 0}}

function parseVentas(buf,fname){
  const wb=XLSX.read(buf,{type:'array'});
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:null});
  let suc='DESCONOCIDA';
  for(let i=0;i<Math.min(10,rows.length);i++){
    const c=rows[i]?.[0];
    if(c&&String(c).toLowerCase().includes('almacenes:')){
      suc=String(c).replace(/almacenes:/i,'').replace(/,/g,'').trim().toUpperCase();break;
    }
  }
  if(suc==='DESCONOCIDA'&&fname){const m=fname.replace(/\.[^.]+$/,'').match(/[_-]([A-ZÁÉÍÓÚ\s]+)$/i);if(m)suc=m[1].trim().toUpperCase();}
  const prod=[];
  for(const row of rows){
    if(!row||!isBC(row[1]))continue;
    const cod=String(row[1]).trim().split('.')[0];
    const nom=row[2]?String(row[2]).trim():'';
    if(!nom||nom.toLowerCase().startsWith('total'))continue;
    const qty=toN(row[5]);
    if(qty<=0)continue;
    prod.push({cod,nom,qty});
  }
  return{suc,prod,_f:fname};
}

function parseEntradas(buf,fname){
  const wb=XLSX.read(buf,{type:'array'});
  const sh=wb.SheetNames.find(s=>s.toUpperCase().includes('DETALL'))||wb.SheetNames[0];
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[sh],{header:1,defval:null});
  const prod=[];
  for(const row of rows){
    if(!row||!isBC(row[2]))continue;
    const cod=String(row[2]).trim().split('.')[0];
    const nom=row[3]?String(row[3]).trim():'';
    if(!nom)continue;
    const qty=toN(row[4]);
    if(qty<=0)continue;
    prod.push({cod,nom,qty});
  }
  return{prod,_f:fname,_sh:sh};
}

function parseNegados(buf,fname){
  const wb=XLSX.read(buf,{type:'array'});
  const suc=fname.replace(/\.[^.]+$/,'').replace(/negados?_?/gi,'').replace(/_/g,' ').trim().toUpperCase()||'SUC';
  const prod=[];const seen=new Set();
  for(const sh of wb.SheetNames){
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[sh],{header:1,defval:null});
    for(const row of rows){
      if(!row||typeof row[0]!=='number'||!row[1])continue;
      const nom=String(row[1]).trim();if(!nom)continue;
      const st=row[9]?String(row[9]).trim():'';
      if(st==='Rechazado')continue;
      const key=suc+'::'+nom.toLowerCase();
      if(!seen.has(key)){seen.add(key);prod.push({nom,st,suc});}
    }
  }
  return{suc,prod,_f:fname};
}

// ── Name match ─────────────────────────────────────────────────────────────
function norm(s){return s.toLowerCase().replace(/[^a-záéíóúüñ0-9]/g,' ').replace(/\s+/g,' ').trim()}
function ovlp(a,b){
  const wa=new Set(norm(a).split(' ').filter(w=>w.length>3));
  const wb2=new Set(norm(b).split(' ').filter(w=>w.length>3));
  if(!wa.size&&!wb2.size)return 0;
  return[...wa].filter(w=>wb2.has(w)).length/new Set([...wa,...wb2]).size;
}

// ── Distribution ───────────────────────────────────────────────────────────
function distribuir(vData,eData,nData){
  const vMap={};
  for(const{suc,prod}of vData)
    for(const{cod,nom,qty}of prod){
      if(!vMap[cod])vMap[cod]={nom,por:{}};
      vMap[cod].por[suc]=(vMap[cod].por[suc]||0)+qty;
    }
  const eMap={};
  for(const{prod}of eData)
    for(const{cod,nom,qty}of prod){
      if(!eMap[cod])eMap[cod]={nom,qty:0};
      eMap[cod].qty+=qty;
    }
  const allNeg=nData.flatMap(f=>f.prod);
  const sucursales=[...new Set(vData.map(v=>v.suc))].sort();

  // Build sucursal buckets: {suc: [{cod,nom,qty,tipo,nota}]}
  const buckets={};
  sucursales.forEach(s=>{buckets[s]=[]});
  buckets['SIN ASIGNAR']=[];

  for(const[cod,{nom,qty:llego}]of Object.entries(eMap)){
    if(vMap[cod]){
      const{por}=vMap[cod];
      const total=Object.values(por).reduce((a,b)=>a+b,0);
      let parcial=llego<total;
      for(const[suc,needed]of Object.entries(por)){
        let asignar;
        if(!parcial){
          asignar=needed;
        }else{
          asignar=Math.floor(needed/total*llego);
        }
        if(asignar<=0)continue;
        if(!buckets[suc])buckets[suc]=[];
        buckets[suc].push({cod,nom,qty:asignar,tipo:'reposicion',nota:parcial?`Parcial: ${llego} de ${total} pzas`:'',llego});
      }
      // Handle remainder in partial case
      if(parcial){
        let assigned=Object.entries(por).reduce((a,[suc,needed])=>a+Math.floor(needed/total*llego),0);
        const resto=llego-assigned;
        if(resto>0){
          const top=Object.entries(por).sort((a,b)=>b[1]-a[1])[0][0];
          const existing=buckets[top].find(p=>p.cod===cod);
          if(existing)existing.qty+=resto;
        }
      }
      // Sobrante
      if(llego>total){
        // goes to almacen (not assigned to any sucursal)
      }
    }else{
      const matches=allNeg.filter(n=>ovlp(nom,n.nom)>=0.35);
      if(matches.length){
        const sucs=[...new Set(matches.map(m=>m.suc))];
        const base=Math.floor(llego/sucs.length),r=llego-base*sucs.length;
        sucs.forEach((suc,i)=>{
          if(!buckets[suc])buckets[suc]=[];
          buckets[suc].push({cod,nom,qty:base+(i===0?r:0),tipo:'negado',nota:'Negado'});
        });
      }else{
        buckets['SIN ASIGNAR'].push({cod,nom,qty:llego,tipo:'sin-asignar',nota:'Sin destino asignado'});
      }
    }
  }

  // Sort products in each bucket by qty desc
  for(const suc of Object.keys(buckets)){
    buckets[suc].sort((a,b)=>b.qty-a.qty);
  }

  return{buckets,sucursales,eMap,vMap};
}

// ── Export (one sheet per sucursal) ───────────────────────────────────────
function exportar(){
  if(!S.res)return;
  const{buckets}=S.res;
  const wbOut=XLSX.utils.book_new();
  for(const[suc,prods]of Object.entries(buckets)){
    if(!prods.length)continue;
    const hdr=['Código','Producto','Cantidad','Tipo','Notas'];
    const data=prods.map(p=>[p.cod,p.nom,p.qty,p.tipo,p.nota]);
    const ws=XLSX.utils.aoa_to_sheet([hdr,...data]);
    ws['!cols']=[{wch:16},{wch:44},{wch:10},{wch:12},{wch:30}];
    XLSX.utils.book_append_sheet(wbOut,ws,suc.substring(0,31));
  }
  XLSX.writeFile(wbOut,'distribucion_almacen.xlsx');
}

// ── Render cards ───────────────────────────────────────────────────────────
function renderCards(){
  if(!S.res)return;
  const{buckets,sucursales}=S.res;

  // Summary row
  const allProds=sucursales.flatMap(s=>buckets[s]||[]);
  const nRep=allProds.filter(p=>p.tipo==='reposicion').length;
  const nNeg=allProds.filter(p=>p.tipo==='negado').length;
  const nSin=(buckets['SIN ASIGNAR']||[]).length;
  document.getElementById('summary-row').innerHTML=
    `<span class="sum-pill sum-rep">✓ ${nRep} reposiciones</span>`+
    (nNeg?`<span class="sum-pill sum-neg">⬤ ${nNeg} negados</span>`:'')+
    (nSin?`<span class="sum-pill sum-sin">! ${nSin} sin asignar</span>`:'')+
    `<span style="font-size:12px;color:var(--muted);margin-left:4px">${sucursales.length} sucursales</span>`;

  // Cards
  const grid=document.getElementById('card-grid');
  grid.innerHTML='';

  // Regular sucursales
  for(const suc of sucursales){
    const prods=buckets[suc]||[];
    const card=document.createElement('div');
    card.className='suc-card';
    const totalPzas=prods.reduce((a,p)=>a+p.qty,0);
    card.innerHTML=`
      <div class="card-header">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="opacity:0.8;flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <span class="card-title">${suc}</span>
        <span class="card-count">${prods.length} productos · ${totalPzas} pzas</span>
      </div>
      <div class="card-body">
        ${prods.length===0
          ? '<div class="empty-card">Sin traspasos hoy</div>'
          : prods.map(p=>`
            <div class="prod-row">
              <div class="qty-badge${p.nota.includes('Parcial')?' is-partial':''}">${p.qty}</div>
              <div class="prod-info">
                <div class="prod-name" title="${p.nom}">${p.nom}</div>
                <div class="prod-code">${p.cod}</div>
                ${p.nota?`<div class="prod-note">${p.nota}</div>`:''}
              </div>
            </div>`).join('')}
      </div>
      <div class="card-footer no-print">
        <span class="card-total"><strong>${totalPzas}</strong> piezas totales</span>
      </div>`;
    grid.appendChild(card);
  }

  // Sin asignar card
  const sinProds=buckets['SIN ASIGNAR']||[];
  if(sinProds.length){
    const card=document.createElement('div');
    card.className='suc-card';
    card.innerHTML=`
      <div class="card-header is-sin">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="opacity:0.8;flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        <span class="card-title">Sin asignar</span>
        <span class="card-count">${sinProds.length} productos</span>
      </div>
      <div class="card-body">
        ${sinProds.map(p=>`
          <div class="prod-row">
            <div class="qty-badge" style="background:#FCEBEB;color:#A32D2D">${p.qty}</div>
            <div class="prod-info">
              <div class="prod-name" title="${p.nom}">${p.nom}</div>
              <div class="prod-code">${p.cod}</div>
              <div class="prod-note" style="color:#A32D2D">Compras debe indicar destino</div>
            </div>
          </div>`).join('')}
      </div>
      <div class="card-footer no-print">
        <span class="card-total" style="color:#A32D2D">Requieren revisión manual</span>
      </div>`;
    grid.appendChild(card);
  }
}

// ── Steps ──────────────────────────────────────────────────────────────────
function showStep(s){
  document.getElementById('step-upload').style.display=s==='upload'?'':'none';
  document.getElementById('step-loading').style.display=s==='loading'?'':'none';
  document.getElementById('step-result').style.display=s==='result'?'':'none';
  document.getElementById('result-actions').style.display=s==='result'?'flex':'none';
}

async function procesar(){
  showStep('loading');
  document.getElementById('upload-err').style.display='none';
  try{
    const vData=await Promise.all(S.v.map(async f=>parseVentas(await readBuf(f),f.name)));
    const eData=await Promise.all(S.e.map(async f=>parseEntradas(await readBuf(f),f.name)));
    const nData=await Promise.all(S.n.map(async f=>parseNegados(await readBuf(f),f.name)));
    S.res=distribuir(vData,eData,nData);

    // Debug if empty
    const{eMap}=S.res;
    const dbg=document.getElementById('debug-info');
    if(Object.keys(eMap).length===0){
      const vTot=vData.reduce((a,d)=>a+d.prod.length,0);
      const eTot=eData.reduce((a,d)=>a+d.prod.length,0);
      dbg.innerHTML='Diagnóstico:<br>'
        +vData.map(d=>`📊 Ventas [${d._f}] → ${d.suc}: ${d.prod.length} productos`).join('<br>')+'<br>'
        +eData.map(d=>`📦 Entradas [${d._f}] → hoja: "${d._sh}": ${d.prod.length} productos`).join('<br>')+'<br>'
        +(vTot===0?'⚠ No se leyeron productos de ventas.<br>':'')
        +(eTot===0?'⚠ No se leyeron productos de entradas.<br>':'');
      dbg.style.display='block';
    }else dbg.style.display='none';

    renderCards();
    showStep('result');
  }catch(e){
    const el=document.getElementById('upload-err');
    el.innerHTML='<strong>Error:</strong> '+e.message;
    el.style.display='flex';
    showStep('upload');
  }
}

function reiniciar(){
  S.v=[];S.e=[];S.n=[];S.res=null;
  ['v','e','n'].forEach(drawChips);
  document.getElementById('upload-err').style.display='none';
  document.getElementById('debug-info').style.display='none';
  upBtn();showStep('upload');
}
